name: Generate demo GIFs
on:
  workflow_dispatch:
  pull_request:
jobs:
  generate-gifs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Standard Scroll (GIF)
        uses: danielpos178/websnap@main
        with:
          url: "https://docs.github.com/en/get-started/start-your-journey/finding-inspiration-on-github"
          save_path: "/docs/images"
          file_name: ss_25_tps_100
          scroll_step: 25
          time_per_frame: 100
          window_width: 1280
          window_height: 720
          
      - name: WebP Format
        uses: danielpos178/websnap@main
        with:
          url: "https://docs.github.com/en/get-started/start-your-journey/finding-inspiration-on-github"
          save_path: "/docs/images"
          file_format: webp
          file_name: webp_demo
          scroll_step: 50
          time_per_frame: 100
          window_width: 1280
          window_height: 720
          
      - name: Dark Mode & Hide Elements
        uses: danielpos178/websnap@main
        with:
          url: "https://docs.github.com/en/get-started/start-your-journey/finding-inspiration-on-github"
          save_path: "/docs/images"
          file_name: dark_mode_demo
          dark_mode: true
          hide_elements: "header, .cookie-banner"
          scroll_step: 50
          time_per_frame: 100
          window_width: 1280
          window_height: 720

      - name: Partial Scroll & Custom Resize
        uses: danielpos178/websnap@main
        with:
          url: "https://docs.github.com/en/get-started/start-your-journey/finding-inspiration-on-github"
          save_path: "/docs/images"
          file_name: partial_scroll_demo
          start_y: 500
          stop_y: 1500
          final_width: 800
          final_height: 600
          resizing_filter: "BICUBIC"
          scroll_step: 50
          time_per_frame: 100
          window_width: 1280
          window_height: 720

      - name: Start Delay
        uses: danielpos178/websnap@main
        with:
          url: "https://docs.github.com/en/get-started/start-your-journey/finding-inspiration-on-github"
          save_path: "/docs/images"
          file_name: delayed_demo
          start_delay: 2000
          scroll_step: 50
          time_per_frame: 100
          window_width: 1280
          window_height: 720

      - name: No Scroll Animation
        uses: danielpos178/websnap@main
        with:
          url: "https://github.com/signup"
          save_path: "/docs/images"
          file_name: animated_no_scroll
          no_scroll: true
          time_per_frame: 100
          time_between_frames: 100
          number_of_frames: 50
          window_width: 1280
          window_height: 720

      - name: Archive GIFs
        uses: actions/upload-artifact@v4
        with:
          name: Generated GIFs
          path: |
            ./docs/images/*
